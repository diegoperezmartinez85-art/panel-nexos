 <!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>NEXOS CONTROL</title>
    <style>
        /* Reset y optimización táctil */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        :root {
            --bg: #0f0f11;
            --bg2: #1a1a1e;
            --bg3: #24242a;
            --border: #2e2e38;
            --text: #e8e8ec;
            --muted: #888898;
            --cyan: #00d4d4;
            --gold: #f5c842;
            --green: #2ecc71;
            --red: #e74c3c;
            --blue: #4a90e2;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            font-size: 14px;
            min-height: 100dvh;
            /* Ajuste para Notch de iPhone y barras de Android */
            padding-top: env(safe-area-inset-top, 10px);
            padding-bottom: env(safe-area-inset-bottom, 10px);
            overflow-x: hidden;
            overscroll-behavior: none;
        }

        .app {
            max-width: 480px;
            margin: 0 auto;
            padding: 8px;
        }

        /* Botones optimizados para dedos */
        button,
        .qa-btn,
        .tab,
        .filtro-btn,
        .mini-btn {
            touch-action: manipulation;
            cursor: pointer;
            transition: transform 0.05s linear;
        }

        button:active,
        .qa-btn:active,
        .tab:active,
        .filtro-btn:active {
            transform: scale(0.96);
            opacity: 0.8;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 12px;
            margin-bottom: 8px;
        }

        .topbar-title {
            font-size: 13px;
            font-weight: 500;
            color: var(--cyan);
        }

        .sync-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
        }

        .sync-dot.offline {
            background: var(--gold);
        }

        .monitor {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 6px;
            margin-bottom: 8px;
        }

        .mon-card {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 6px;
            text-align: center;
        }

        .mon-val {
            font-size: 26px;
            font-weight: 700;
            line-height: 1;
        }

        .mon-label {
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: .5px;
            margin-top: 3px;
        }

        .mon-d .mon-val {
            color: var(--gold);
        }

        .mon-d .mon-label {
            color: var(--gold);
            opacity: .7;
        }

        .mon-v .mon-val {
            color: var(--green);
        }

        .mon-v .mon-label {
            color: var(--green);
            opacity: .7;
        }

        .mon-a .mon-val {
            color: var(--red);
        }

        .mon-a .mon-label {
            color: var(--red);
            opacity: .7;
        }

        .search-box {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 8px;
        }

        .search-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }

        .search-input {
            flex: 1;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            color: var(--text);
            font-size: 15px;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--cyan);
        }

        .search-btn {
            background: var(--cyan);
            color: #000;
            border: none;
            border-radius: 8px;
            padding: 10px 14px;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
        }

        .action-btns {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .btn-ingreso {
            background: rgba(46, 204, 113, .15);
            border: 1px solid var(--green);
            color: var(--green);
            border-radius: 10px;
            padding: 14px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .btn-salida {
            background: rgba(231, 76, 60, .15);
            border: 1px solid var(--red);
            color: var(--red);
            border-radius: 10px;
            padding: 14px;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .btn-ingreso:active,
        .btn-salida:active {
            opacity: .7;
            transform: scale(.97);
        }

        .btn-icon {
            font-size: 20px;
        }

        .quick-actions {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 6px;
            margin-bottom: 8px;
        }

        .qa-btn {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 4px;
            text-align: center;
            cursor: pointer;
            color: var(--muted);
            font-size: 10px;
        }

        .qa-btn:active {
            background: var(--bg3);
            color: var(--text);
        }

        .qa-icon {
            font-size: 16px;
            display: block;
            margin-bottom: 3px;
        }

        .qa-btn.cyan {
            color: var(--cyan);
            border-color: rgba(0, 212, 212, .3);
        }

        .qa-btn.gold {
            color: var(--gold);
            border-color: rgba(245, 200, 66, .3);
        }

        .tabs {
            display: flex;
            gap: 6px;
            margin-bottom: 8px;
        }

        .tab {
            flex: 1;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            color: var(--muted);
        }

        .tab.active {
            background: var(--bg3);
            color: var(--text);
            border-color: var(--cyan);
        }

        .section {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px;
        }

        .section-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: .5px;
            color: var(--muted);
            margin-bottom: 10px;
        }

        .registro-form {
            display: none;
            flex-direction: column;
            gap: 8px;
        }

        .registro-form.visible {
            display: flex;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px; /* Mayor espaciado */
        }

        .form-field {
            margin-bottom: 8px;
        }

        .form-field label {
            display: block;
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 6px; /* Mayor espaciado inferior */
        }

        .form-field input,
        .form-field select {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px; /* Bordes más redondeados */
            padding: 14px; /* Mayor padding para inputs más grandes */
            color: var(--text);
            font-size: 16px; /* Letra más grande para mejor legibilidad */
            outline: none;
        }

        .form-field input:focus {
            border-color: var(--cyan);
        }

        .btn-guardar {
            background: var(--blue);
            color: #fff;
            border: none;
            border-radius: 10px; /* Bordes más redondeados */
            padding: 16px; /* Botón más grande */
            font-weight: 700;
            font-size: 16px; /* Letra del botón más grande */
            cursor: pointer;
            width: 100%;
            margin-top: 12px; /* Más espacio superior */
        }

        .btn-guardar:active {
            opacity: .8;
        }

        .lista-registros {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-height: 400px;
            overflow-y: auto;
        }

        .reg-item {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .reg-item.adentro {
            border-left: 3px solid var(--green);
        }

        .reg-item.afuera {
            border-left: 3px solid var(--red);
        }

        .reg-info {
            flex: 1;
        }

        .reg-patente {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        .reg-detalle {
            font-size: 11px;
            color: var(--muted);
            margin-top: 2px;
        }

        .reg-status {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .badge {
            font-size: 10px;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 700;
        }

        .badge-in {
            background: rgba(46, 204, 113, .2);
            color: var(--green);
        }

        .badge-out {
            background: rgba(231, 76, 60, .2);
            color: var(--red);
        }

        .badge-del {
            background: rgba(245, 200, 66, .2);
            color: var(--gold);
        }

        .reg-hora {
            font-size: 10px;
            color: var(--muted);
        }

        .reg-actions {
            display: flex;
            gap: 4px;
            margin-top: 4px;
        }

        .mini-btn {
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 8px;
            color: var(--text);
            font-size: 10px;
            cursor: pointer;
        }

        .mini-btn.red {
            color: var(--red);
        }

        .mini-btn:active {
            opacity: .7;
        }

        .toast {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1e;
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 10px 20px;
            font-size: 13px;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
            z-index: 999;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
        }

        .filtro-btns {
            display: flex;
            gap: 6px;
            margin-bottom: 10px;
        }

        .filtro-btn {
            flex: 1;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 7px;
            text-align: center;
            cursor: pointer;
            font-size: 11px;
            color: var(--muted);
        }

        .filtro-btn.active {
            color: var(--cyan);
            border-color: var(--cyan);
        }

        .empty {
            text-align: center;
            padding: 30px;
            color: var(--muted);
            font-size: 13px;
        }

        .config-box {
            display: none;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            margin-bottom: 10px;
        }

        .config-box.visible {
            display: block;
        }

        .config-label {
            font-size: 11px;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .config-input {
            width: 100%;
            background: var(--bg2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            color: var(--text);
            font-size: 12px;
            outline: none;
            margin-bottom: 8px;
        }

        .btn-config {
            background: var(--bg3);
            color: var(--cyan);
            border: 1px solid rgba(0, 212, 212, .3);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 12px;
            cursor: pointer;
        }

        .panel-section {
            display: none;
        }

        .panel-section.active {
            display: block;
        }
    </style>
</head>
<body>

<div class="app">
    <div class="topbar">
        <span class="topbar-title">NEXOS CONTROL</span>
        <div style="display:flex;align-items:center;gap:8px;">
            <span id="sync-label" style="font-size:11px;color:var(--muted);">offline</span>
            <div class="sync-dot offline" id="sync-dot"></div>
        </div>
    </div>

    <div class="monitor">
        <div class="mon-card mon-d"><div class="mon-val" id="mon-d">0</div><div class="mon-label">Delivery</div></div>
        <div class="mon-card mon-v"><div class="mon-val" id="mon-v">2</div><div class="mon-label">Visitas</div></div>
        <div class="mon-card mon-a"><div class="mon-val" id="mon-a">0</div><div class="mon-label">Alertas</div></div>
    </div>

    <div class="search-box">
        <div class="search-row">
            <input class="search-input" id="buscador" placeholder="DNI o Patente..." oninput="onBuscador(this.value)">
            <button class="search-btn" onclick="limpiarBuscador()">X</button>
        </div>
        <div class="action-btns">
            <button class="btn-ingreso" onclick="registrarAcceso('ingreso')">
                <span class="btn-icon">📥</span>
                <span>INGRESO</span>
            </button>
            <button class="btn-salida" onclick="registrarAcceso('salida')">
                <span class="btn-icon">📤</span>
                <span>SALIDA</span>
            </button>
        </div>
    </div>

    <div class="quick-actions">
        <div class="qa-btn" onclick="showPanel('lista')"><span class="qa-icon">📋</span>LISTA</div>
        <div class="qa-btn gold active" onclick="showPanel('manual')"><span class="qa-icon">➕</span>MANUAL</div>
        <div class="qa-btn gold" onclick="showPanel('delivery')"><span class="qa-icon">🛵</span>DELY</div>
        <div class="qa-btn" onclick="showPanel('config')"><span class="qa-icon">⚙️</span>CONFIG</div>
    </div>

    <div id="panel-config" class="panel-section config-panel">
        <div class="section">
            <div class="section-title">Configuración Google Sheets</div>
            <div class="form-field" style="margin-bottom:8px;">
                <label>ID de la planilla</label>
                <input class="config-input" id="sheet-id" placeholder="1BxiMVs0XRA5nFMdKvBdBZjgmUUqptlbs74OgVE2upms" style="width:100%">
            </div>
            <div class="form-field" style="margin-bottom:8px;">
                <label>Google Apps Script URL (Web App)</label>
                <input class="config-input" id="gas-url" placeholder="https://script.google.com/macros/s/.../exec" style="width:100%">
            </div>
            <button class="btn-guardar" onclick="guardarConfig()">Guardar configuración</button>
            <p style="font-size:10px;color:var(--muted);margin-top:8px;text-align:center;">Los datos se sincronizan con tu Google Sheet cuando hay internet</p>
        </div>
    </div>

    <div id="panel-manual" class="panel-section manual-panel active">
        <div class="section">
            <div class="section-title">Datos del Visitante</div>
            <div style="display:flex;flex-direction:column;gap:12px;"> <div class="form-row">
                    <div class="form-field">
                        <label>Patente</label>
                        <input id="m-patente" placeholder="..." oninput="this.value=this.value.toUpperCase()">
                    </div>
                    <div class="form-field">
                        <label>DNI / Nombre</label>
                        <input id="m-dni" placeholder="...">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-field">
                        <label>Manzana</label>
                        <input id="m-mza" placeholder="...">
                    </div>
                    <div class="form-field">
                        <label>Casa</label>
                        <input id="m-casa" placeholder="...">
                    </div>
                </div>
                <button class="btn-guardar" onclick="cargarManual()">Registrar Ingreso</button>
            </div>
        </div>
    </div>

    <div id="panel-delivery" class="panel-section delivery-panel">
        <div class="section">
            <div class="section-title">Ingreso Delivery</div>
            <div style="display:flex;flex-direction:column;gap:12px;"> <div class="form-row">
                    <div class="form-field">
                        <label>Patente</label>
                        <input id="d-patente" placeholder="..." oninput="this.value=this.value.toUpperCase()">
                    </div>
                    <div class="form-field">
                        <label>Empresa</label>
                        <input id="d-dni" placeholder="Empresa (PedidoYa, Mo...)">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-field">
                        <label>Manzana</label>
                        <input id="d-mza" placeholder="...">
                    </div>
                    <div class="form-field">
                        <label>Lote</label>
                        <input id="d-casa" placeholder="...">
                    </div>
                </div>
                <button class="btn-guardar" style="background-color: var(--gold); color: black" onclick="cargarManual()">Registrar Delivery</button>
            </div>
        </div>
    </div>

    <div id="panel-lista" class="panel-section active lista-panel">
        <div class="section">
            <div class="section-title">Registros del turno</div>
            <div class="filtro-btns">
                <div class="filtro-btn active" onclick="setFiltro('todos',this)">Todos</div>
                <div class="filtro-btn" onclick="setFiltro('adentro',this)">Adentro</div>
                <div class="filtro-btn" onclick="setFiltro('delivery',this)">Delivery</div>
            </div>
            <div class="lista-registros" id="lista"></div>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // Tu script JavaScript existente aquí...
</script>

</body>
</html>
