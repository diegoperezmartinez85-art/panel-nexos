<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NEXOS CONTROL</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{--bg:#0f0f11;--bg2:#1a1a1e;--bg3:#24242a;--border:#2e2e38;--text:#e8e8ec;--cyan:#00d4d4;--gold:#f5c842;--green:#2ecc71;--red:#e74c3c;--blue:#4a90e2;}
    body { background: var(--bg); color: var(--text); font-family: -apple-system, system-ui, sans-serif; padding: env(safe-area-inset-top, 10px) 10px env(safe-area-inset-bottom, 10px) 10px; user-select: none; }
    .app { max-width: 500px; margin: 0 auto; }
    .monitor{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
    .mon-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:15px 5px;text-align:center;}
    .mon-val{font-size:32px;font-weight:800;display:block;}
    .search-box{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:12px;}
    .search-input{width:100%;background:var(--bg3);border:2px solid var(--border);border-radius:12px;padding:18px;color:white;font-size:22px;margin-bottom:15px;outline:none;text-align:center;}
    .action-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .btn-main { border-radius: 16px; padding: 25px 10px; font-weight: 800; border: 2px solid transparent; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; touch-action: manipulation; }
    .btn-main:active { transform: scale(0.92); filter: brightness(1.4); }
    .ingreso { background: rgba(46,204,113,0.1); border-color: var(--green); color: var(--green); }
    .salida { background: rgba(231,76,60,0.1); border-color: var(--red); color: var(--red); }
    .big-icon { font-size: 45px; }
    .menu-nav{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
    .nav-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 5px;text-align:center;color:white;font-size:11px;font-weight:700;cursor:pointer;opacity:0.4; touch-action: manipulation;}
    .nav-item.active{color:var(--cyan);border-color:var(--cyan);opacity:1;background:var(--bg3);}
    .nav-icon{display:block;font-size:24px;margin-bottom:4px;}
    .section{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:10px;}
    input.giant { width:100%; padding:20px; margin-bottom:15px; border-radius:12px; background:var(--bg3); color:white; border:2px solid var(--border); text-align:center; font-size:20px; outline:none; }
    input.giant:focus { border-color: var(--cyan); }
    .btn-save { width:100%; padding:25px; background:var(--blue); color:white; border:none; border-radius:15px; font-weight: 800; font-size: 18px; cursor:pointer; touch-action: manipulation; }
    .btn-save:active { transform: scale(0.95); }
    .panel { display: none; }
    .panel.active { display: block; }
    .reg-item{background:var(--bg3);border-radius:12px;padding:15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;border-left:6px solid var(--border);}
    .reg-item.adentro{border-left-color:var(--green);}
    .reg-item.alerta{border-left-color:var(--red); background: rgba(231,76,60,0.05);}
    .toast{position:fixed;bottom:50px;left:50%;transform:translateX(-50%);background:var(--cyan);color:black;padding:15px 30px;border-radius:50px;font-weight:800;opacity:0;transition:0.3s;pointer-events:none;z-index:999;}
    .toast.show{opacity:1;}
  </style>
</head>
<body>

<div class="app">
  <div class="monitor">
    <div class="mon-card" style="color:var(--gold)"><span class="mon-val" id="mon-d">0</span><span style="font-size:10px">DELIVERY</span></div>
    <div class="mon-card" style="color:var(--green)"><span class="mon-val" id="mon-v">0</span><span style="font-size:10px">VISITAS</span></div>
    <div class="mon-card" style="color:var(--red)"><span class="mon-val" id="mon-a">0</span><span style="font-size:10px">ALERTAS</span></div>
  </div>

  <div class="search-box">
    <input class="search-input" id="buscador" placeholder="PATENTE O DNI..." oninput="this.value=this.value.toUpperCase()">
    <div class="action-btns">
      <div class="btn-main ingreso" onclick="registrarRapido('ingreso')">
        <span class="big-icon">📥</span><span>INGRESO</span>
      </div>
      <div class="btn-main salida" onclick="registrarRapido('salida')">
        <span class="big-icon">📤</span><span>SALIDA</span>
      </div>
    </div>
  </div>

  <div class="menu-nav">
    <div class="nav-item active" id="btn-lista" onclick="ver('lista')"><span class="nav-icon">📋</span>LISTA</div>
    <div class="nav-item" id="btn-manual" onclick="ver('manual')"><span class="nav-icon">➕</span>MANUAL</div>
    <div class="nav-item" id="btn-delivery" onclick="ver('delivery')"><span class="nav-icon">🛵</span>DELY</div>
    <div class="nav-item" id="btn-config" onclick="ver('config')"><span class="nav-icon">⚙️</span>CONFIG</div>
  </div>

  <div id="p-lista" class="panel active"><div class="section" id="cont-lista"></div></div>
  <div id="p-manual" class="panel"><div class="section"><p style="color:var(--cyan); font-weight:800; margin-bottom:10px;">DATOS VISITANTE</p><input id="m-pat" class="giant" placeholder="PATENTE" oninput="this.value=this.value.toUpperCase()"><input id="m-dni" class="giant" placeholder="DNI / NOMBRE"><button class="btn-save" onclick="guardarManual()">REGISTRAR INGRESO</button></div></div>
  <div id="p-delivery" class="panel"><div class="section"><p style="color:var(--gold); font-weight:800; margin-bottom:10px;">INGRESO DELIVERY</p><input id="d-pat" class="giant" placeholder="PATENTE MOTO" oninput="this.value=this.value.toUpperCase()"><input id="d-emp" class="giant" placeholder="EMPRESA"><button class="btn-save" style="background:var(--gold); color:black;" onclick="guardarDelivery()">REGISTRAR DELIVERY</button></div></div>
  <div id="p-config" class="panel"><div class="section"><p style="color:var(--cyan); font-weight:800; margin-bottom:10px;">URL WEB APP</p><input id="cfg-url" class="giant" style="font-size:12px;" placeholder="https://script.google.com/..."><button class="btn-save" style="background:var(--cyan); color:black;" onclick="guardarConfig()">GUARDAR Y TEST</button></div></div>
</div>

<div id="toast" class="toast"></div>

<script>
  let DB = JSON.parse(localStorage.getItem('nx_db') || '[]');

  function vibrar() { if(navigator.vibrate) navigator.vibrate(60); }
  function showToast(msg) { const t = document.getElementById('toast'); t.innerText = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

  function ver(nombre) {
    vibrar();
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    document.getElementById('p-' + nombre).classList.add('active');
    document.getElementById('btn-' + nombre).classList.add('active');
  }

  // --- FUNCIÓN CRÍTICA: ENVÍO A GOOGLE ---
  async function enviarAGoogle(datos) {
    const url = localStorage.getItem('nx_url');
    if(!url) { console.log("No hay URL de Google"); return; }
    
    try {
      // Usamos 'no-cors' para evitar bloqueos, aunque Google no devuelva respuesta legible, el dato llega.
      await fetch(url, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(datos)
      });
      console.log("Datos enviados");
    } catch (e) {
      console.error("Error al enviar", e);
    }
  }

  function registrarRapido(tipo) {
    vibrar();
    const val = document.getElementById('buscador').value.trim();
    if(!val) { showToast("⚠️ INGRESE DATO"); return; }
    const hora = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    
    let nuevo;
    if(tipo === 'ingreso') {
      nuevo = {id: Date.now(), pat: val, tipo:'VISITA', hE: hora, hS: '', tsE: Date.now()};
      DB.push(nuevo);
      showToast("✅ INGRESO OK");
    } else {
      nuevo = DB.find(x => x.pat === val && !x.hS);
      if(nuevo) { 
        nuevo.hS = hora; 
        showToast("🚪 SALIDA OK"); 
      } else {
        showToast("❌ NO ENCONTRADO");
        return;
      }
    }
    enviarAGoogle(nuevo);
    document.getElementById('buscador').value = '';
    actualizar();
  }

  function guardarManual() {
    vibrar();
    const p = document.getElementById('m-pat').value.trim();
    if(!p) return;
    const nuevo = {id: Date.now(), pat: p, tipo: 'MANUAL', hE: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), hS: '', tsE: Date.now()};
    DB.push(nuevo);
    enviarAGoogle(nuevo);
    document.getElementById('m-pat').value = '';
    showToast("✅ REGISTRADO");
    ver('lista');
    actualizar();
  }

  function guardarDelivery() {
    vibrar();
    const p = document.getElementById('d-pat').value.trim();
    if(!p) return;
    const nuevo = {id: Date.now(), pat: p, tipo: 'DELIVERY', hE: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), hS: '', tsE: Date.now()};
    DB.push(nuevo);
    enviarAGoogle(nuevo);
    document.getElementById('d-pat').value = '';
    showToast("🛵 DELIVERY OK");
    ver('lista');
    actualizar();
  }

  function darSalida(id) {
    vibrar();
    let r = DB.find(x => x.id === id);
    if(r) {
      r.hS = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
      enviarAGoogle(r);
    }
    actualizar();
  }

  function guardarConfig() {
    vibrar();
    const url = document.getElementById('cfg-url').value.trim();
    localStorage.setItem('nx_url', url);
    showToast("⚙️ CONFIGURACIÓN GUARDADA");
    // Test rápido
    enviarAGoogle({pat: "TEST-CONEXION", tipo: "SISTEMA", hE: "OK", hS: ""});
  }

  function actualizar() {
    localStorage.setItem('nx_db', JSON.stringify(DB));
    render();
  }

  function render() {
    const cont = document.getElementById('cont-lista');
    const ahora = Date.now();
    let alertasCount = 0;
    cont.innerHTML = DB.slice().reverse().map(r => {
      let claseAlerta = (r.tipo === 'DELIVERY' && !r.hS && (ahora - r.tsE > 900000)) ? "alerta" : "";
      if(claseAlerta) alertasCount++;
      return `<div class="reg-item ${r.hS ? '' : 'adentro'} ${claseAlerta}">
        <div><strong>${r.pat}</strong><br><small>${r.tipo} | ${r.hE}${r.hS ? ' - '+r.hS : ''}</small></div>
        ${!r.hS ? `<button onclick="darSalida(${r.id})" style="background:var(--red); color:white; border:none; padding:10px 15px; border-radius:10px; font-weight:800;">SALIDA</button>` : '<span style="opacity:0.5; font-size:12px;">SALIO</span>'}
      </div>`;
    }).join('') || '<p style="text-align:center; opacity:0.3; margin-top:20px;">SIN REGISTROS</p>';
    document.getElementById('mon-v').innerText = DB.filter(x => x.tipo !== 'DELIVERY' && !x.hS).length;
    document.getElementById('mon-d').innerText = DB.filter(x => x.tipo === 'DELIVERY' && !x.hS).length;
    document.getElementById('mon-a').innerText = alertasCount;
  }

  setInterval(render, 60000);
  document.getElementById('cfg-url').value = localStorage.getItem('nx_url') || '';
  render();
</script>
</body>
</html>
