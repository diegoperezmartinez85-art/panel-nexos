<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>NEXOS</title>
  <style>
    *{box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; user-select:none;}
    :root{--bg:#0f0f11;--bg2:#1a1a1e;--cyan:#00d4d4;--green:#2ecc71;--red:#e74c3c;--text:#e8e8ec;}
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: sans-serif;
      padding: 20px 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .app { width: 100%; max-width: 400px; }

    /* BOTONES GIGANTES */
    .btn-box {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 15px;
      margin-top: 20px;
    }

    .boton {
      background: var(--bg2);
      border: 2px solid #333;
      border-radius: 20px;
      padding: 30px 10px;
      text-align: center;
      color: white;
      font-weight: bold;
      transition: all 0.1s;
      /* Esto asegura que el táctil responda */
      cursor: pointer;
      touch-action: manipulation;
    }

    .boton:active {
      transform: scale(0.9);
      filter: brightness(1.5);
    }

    .ingreso:active { border-color: var(--green); box-shadow: 0 0 20px var(--green); }
    .salida:active { border-color: var(--red); box-shadow: 0 0 20px var(--red); }

    .icon { font-size: 50px; display: block; margin-bottom: 10px; }

    input {
      width: 100%;
      padding: 20px;
      border-radius: 15px;
      border: 2px solid #333;
      background: #000;
      color: var(--cyan);
      font-size: 24px;
      text-align: center;
      margin-bottom: 10px;
    }

    .lista {
      margin-top: 20px;
      background: var(--bg2);
      border-radius: 15px;
      padding: 10px;
      width: 100%;
      min-height: 100px;
    }

    .item {
      padding: 15px;
      border-bottom: 1px solid #333;
      display: flex;
      justify-content: space-between;
    }
  </style>
</head>
<body>

<div class="app">
  <h2 style="text-align:center; color:var(--cyan); margin-bottom:20px;">NEXOS CONTROL</h2>
  
  <input type="text" id="dni" placeholder="PATENTE / DNI" oninput="this.value=this.value.toUpperCase()">

  <div class="btn-box">
    <div class="boton ingreso" onclick="registrar('ENTRADA')">
      <span class="icon">📥</span> ENTRADA
    </div>
    <div class="boton salida" onclick="registrar('SALIDA')">
      <span class="icon">📤</span> SALIDA
    </div>
  </div>

  <div class="lista" id="lista">
    <p style="text-align:center; opacity:0.5; padding:20px;">Sin movimientos</p>
  </div>
</div>

<script>
  // Función para vibrar
  function vibrar() {
    if (navigator.vibrate) {
      navigator.vibrate(50);
    }
  }

  function registrar(tipo) {
    vibrar();
    const campo = document.getElementById('dni');
    const valor = campo.value.trim();
    
    if (valor === "") {
      alert("PONÉ ALGO");
      return;
    }

    const lista = document.getElementById('lista');
    // Si es el primer item, borramos el "Sin movimientos"
    if (lista.innerHTML.includes("Sin movimientos")) {
      lista.innerHTML = "";
    }

    const hora = new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
    
    const nuevoItem = document.createElement('div');
    nuevoItem.className = 'item';
    nuevoItem.innerHTML = `
      <span><strong>${valor}</strong></span>
      <span style="color:${tipo === 'ENTRADA' ? '#2ecc71' : '#e74c3c'}">${tipo} ${hora}</span>
    `;

    lista.prepend(nuevoItem);
    campo.value = ""; // Limpiar buscador
  }
</script>

</body>
</html>
