<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="NEXOS">

  <title>NEXOS - Panel de Acceso</title>

  <style>
  /* Reset y optimización táctil */
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  :root{--bg:#0f0f11;--bg2:#1a1a1e;--bg3:#24242a;--border:#2e2e38;--text:#e8e8ec;--muted:#888898;--cyan:#00d4d4;--gold:#f5c842;--green:#2ecc71;--red:#e74c3c;--blue:#4a90e2;}
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 14px;
    min-height: 100dvh;
    /* Ajuste para Notch de iPhone y barras de Android */
    padding-top: env(safe-area-inset-top, 10px);
    padding-bottom: env(safe-area-inset-bottom, 10px);
    overflow-x: hidden;
    overscroll-behavior: none;
  }

  .app{max-width:480px;margin:0 auto;padding:8px;}

  /* Botones optimizados para dedos */
  button, .qa-btn, .tab, .filtro-btn, .mini-btn {
    touch-action: manipulation;
    cursor: pointer;
    transition: transform 0.05s linear;
  }
  
  button:active, .qa-btn:active, .tab:active, .filtro-btn:active {
    transform: scale(0.96);
    opacity: 0.8;
  }

  .topbar{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:10px 12px;margin-bottom:8px;}
  .topbar-title{font-size:13px;font-weight:700;color:var(--cyan);letter-spacing:0.5px;}
  .sync-dot{width:8px;height:8px;border-radius:50%;background:var(--green);}
  .sync-dot.offline{background:var(--gold);}

  .monitor{display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;margin-bottom:8px;}
  .mon-card{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 6px;text-align:center;}
  .mon-val{font-size:26px;font-weight:700;line-height:1;}
  .mon-label{font-size:9px;text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}
  .mon-d .mon-val{color:var(--gold);}
  .mon-v .mon-val{color:var(--green);}
  .mon-a .mon-val{color:var(--red);}

  .search-box{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px;}
  .search-row{display:flex;gap:8px;margin-bottom:10px;}
  .search-input{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:16px;outline:none;}
  .search-btn{background:var(--cyan);color:#000;border:none;border-radius:8px;padding:0 15px;font-weight:700;}

  .action-btns{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .btn-ingreso{background:rgba(46,204,113,.15);border:1px solid var(--green);color:var(--green);border-radius:10px;padding:16px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:4px;}
  .btn-salida{background:rgba(231,76,60,.15);border:1px solid var(--red);color:var(--red);border-radius:10px;padding:16px;font-weight:700;display:flex;flex-direction:column;align-items:center;gap:4px;}

  .quick-actions{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px;}
  .qa-btn{background:var(--bg2);border:1px solid var(--border);border-radius:10px;padding:10px 4px;text-align:center;color:var(--muted);font-size:10px;}
  .qa-icon{font-size:16px;display:block;margin-bottom:3px;}
  .qa-btn.cyan{color:var(--cyan);border-color:rgba(0,212,212,.3);}

  .section{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;}
  .section-title{font-size:11px;text-transform:uppercase;color:var(--muted);margin-bottom:10px;}

  .form-field{margin-bottom:10px;}
  .form-field label{display:block;font-size:11px;color:var(--muted);margin-bottom:4px;}
  .form-field input, .form-field select{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:12px;color:var(--text);font-size:16px;outline:none;}
  .btn-guardar{background:var(--blue);color:#fff;border:none;border-radius:8px;padding:14px;font-weight:700;font-size:15px;width:100%;}

  .lista-registros{display:flex;flex-direction:column;gap:6px;overflow-y:auto;}
  .reg-item{background:var(--bg3);border:1px solid var(--border);border-radius:10px;padding:12px;display:flex;justify-content:space-between;align-items:center;}
  .reg-item.adentro{border-left:4px solid var(--green);}
  .reg-item.afuera{border-left:4px solid var(--red);}
  .reg-patente{font-size:15px;font-weight:700;}
  .reg-detalle{font-size:11px;color:var(--muted);}

  .badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;}
  .badge-in{background:rgba(46,204,113,.2);color:var(--green);}
  .badge-out{background:rgba(231,76,60,.2);color:var(--red);}
  .badge-del{background:rgba(245,200,66,.2);color:var(--gold);}

  .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1a1a1e;border:1px solid var(--cyan);border-radius:10px;padding:12px 24px;font-size:14px;opacity:0;transition:opacity .3s;z-index:9999;pointer-events:none;}
  .toast.show{opacity:1;}

  .panel-section{display:none;}
  .panel-section.active{display:block;}
  .filtro-btns{display:flex;gap:6px;margin-bottom:10px;}
  .filtro-btn{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center;font-size:12px;color:var(--muted);}
  .filtro-btn.active{color:var(--cyan);border-color:var(--cyan);}
  </style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <span class="topbar-title">NEXOS - Panel de Acceso</span>
    <div style="display:flex;align-items:center;gap:8px;">
      <span id="sync-label" style="font-size:11px;color:var(--muted);">offline</span>
      <div class="sync-dot offline" id="sync-dot"></div>
    </div>
  </div>

  <div class="monitor">
    <div class="mon-card mon-d"><div class="mon-val" id="mon-d">0</div><div class="mon-label">Delivery</div></div>
    <div class="mon-card mon-v"><div class="mon-val" id="mon-v">0</div><div class="mon-label">Visitas</div></div>
    <div class="mon-card mon-a"><div class="mon-val" id="mon-a">0</div><div class="mon-label">Alertas</div></div>
  </div>

  <div class="search-box">
    <div class="search-row">
      <input class="search-input" id="buscador" placeholder="DNI o Patente..." oninput="onBuscador(this.value)">
      <button class="search-btn" onclick="limpiarBuscador()">X</button>
    </div>
    <div class="action-btns">
      <button class="btn-ingreso" onclick="registrarAcceso('ingreso')">
        <span style="font-size:20px">▶</span>
        <span>INGRESO</span>
      </button>
      <button class="btn-salida" onclick="registrarAcceso('salida')">
        <span style="font-size:20px">◀</span>
        <span>SALIDA</span>
      </button>
    </div>
  </div>

  <div class="quick-actions">
    <div class="qa-btn cyan" onclick="showPanel('lista')"><span class="qa-icon">≡</span>Lista</div>
    <div class="qa-btn" onclick="showPanel('manual')"><span class="qa-icon">+</span>Manual</div>
    <div class="qa-btn" onclick="showPanel('delivery')"><span class="qa-icon">▣</span>Delivery</div>
    <div class="qa-btn cyan" onclick="showPanel('config')"><span class="qa-icon">⚙</span>Config</div>
  </div>

  <div id="panel-config" class="panel-section">
    <div class="section">
      <div class="section-title">Configuración</div>
      <div class="form-field">
        <label>ID de la planilla</label>
        <input id="sheet-id" placeholder="ID de Google Sheet">
      </div>
      <div class="form-field">
        <label>Apps Script URL</label>
        <input id="gas-url" placeholder="https://script.google.com/...">
      </div>
      <button class="btn-guardar" onclick="guardarConfig()">Guardar configuración</button>
    </div>
  </div>

  <div id="panel-manual" class="panel-section">
    <div class="section">
      <div class="section-title">Carga manual</div>
      <div class="form-field"><label>Patente</label><input id="m-patente" placeholder="ABC123" oninput="this.value=this.value.toUpperCase()"></div>
      <div class="form-field"><label>DNI / Nombre</label><input id="m-dni" placeholder="..."></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div class="form-field"><label>Mza</label><input id="m-mza" placeholder="Mza"></div>
        <div class="form-field"><label>Casa</label><input id="m-casa" placeholder="Casa"></div>
      </div>
      <button class="btn-guardar" onclick="cargarManual()">Registrar Ingreso</button>
    </div>
  </div>

  <div id="panel-delivery" class="panel-section">
    <div class="
