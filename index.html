<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>NEXOS CONTROL</title>
  <style>
    /* TU ESTÉTICA (NO SE TOCA) */
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    :root{--bg:#0f0f11;--bg2:#1a1a1e;--bg3:#24242a;--border:#2e2e38;--text:#e8e8ec;--cyan:#00d4d4;--gold:#f5c842;--green:#2ecc71;--red:#e74c3c;--blue:#4a90e2;}
    
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, system-ui, sans-serif;
      padding: env(safe-area-inset-top, 10px) 10px env(safe-area-inset-bottom, 10px) 10px;
    }

    .app { max-width: 500px; margin: 0 auto; }

    .topbar{display:flex;align-items:center;justify-content:space-between;background:var(--bg2);border:1px solid var(--border);border-radius:15px;padding:15px;margin-bottom:12px;}
    .sync-dot{width:12px;height:12px;border-radius:50%;background:var(--green);box-shadow:0 0 10px var(--green);}

    .monitor{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px;}
    .mon-card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:15px 5px;text-align:center;}
    .mon-val{font-size:32px;font-weight:800;display:block;}

    .search-box{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:15px;margin-bottom:12px;}
    .search-input{width:100%;background:var(--bg3);border:2px solid var(--border);border-radius:12px;padding:18px;color:white;font-size:20px;margin-bottom:15px;outline:none;text-align:center;}
    
    .action-btns{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    
    .btn-main {
      border-radius: 16px; padding: 25px 10px; font-weight: 800; border: 2px solid transparent;
      display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; touch-action: manipulation;
    }
    .btn-main:active { transform: scale(0.92); filter: brightness(1.4); }
    .ingreso { background: rgba(46,204,113,0.1); border-color: var(--green); color: var(--green); }
    .ingreso:active { box-shadow: 0 0 30px var(--green); }
    .salida { background: rgba(231,76,60,0.1); border-color: var(--red); color: var(--red); }
    .salida:active { box-shadow: 0 0 30px var(--red); }
    .big-icon { font-size: 45px; }

    .menu-nav{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:12px;}
    .nav-item{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px 5px;text-align:center;color:var(--muted);font-size:11px;font-weight:700;cursor:pointer;touch-action:manipulation;}
    .nav-item.active{color:var(--cyan);border-color:var(--cyan);}
    .nav-icon{display:block;font-size:24px;margin-bottom:4px;}

    .section{background:var(--bg2);border:1px solid var(--border);border-radius:18px;padding:15px;}
    .reg-item{background:var(--bg3);border-radius:12px;padding:15px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;border-left:6px solid var(--border);}
    .reg-item.adentro{border-left-color:var(--green);}

    /* LOS PANELES (OCULTOS POR DEFECTO) */
    .panel { display: none; }
    .panel.active { display: block; }

    .toast{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:var(--cyan);color:black;padding:12px 25px;border-radius:50px;font-weight:800;opacity:0;transition:0.3s;pointer-events:none;}
    .toast.show{opacity:1;}
  </style>
</head>
<body>

<div class="app">
  <div class="topbar">
    <span style="font-weight:800; color:var(--cyan)">NEXOS CONTROL</span>
    <div class="sync-dot"></div>
  </div>

  <div class="monitor">
    <div class="mon-card" style="color:var(--gold)"><span class="mon-val" id="mon-d">0</span><span style="font-size:10px">DELIVERY</span></div>
    <div class="mon-card" style="color:var(--green)"><span class="mon-val" id="mon-v">0</span><span style="font-size:10px">VISITAS</span></div>
    <div class="mon-card" style="color:var(--red)"><span class="mon-val" id="mon-a">0</span><span style="font-size:10px">ALERTAS</span></div>
  </div>

  <div class="search-box">
    <input class="search-input" id="buscador" placeholder="PATENTE O DNI..." oninput="this.value=this.value.toUpperCase()">
    <div class="action-btns">
      <div class="btn-main ingreso" onclick="registrar('ingreso')">
        <span class="big-icon">📥</span><span>INGRESO</span>
      </div>
      <div class="btn-main salida" onclick="registrar('salida')">
        <span class="big-icon">📤</span><span>SALIDA</span>
      </div>
    </div>
  </div>

  <div class="menu-nav">
    <div class="nav-item active" id="btn-lista" onclick="ver('lista')"><span class="nav-icon">📋</span>LISTA</div>
    <div class="nav-item" id="btn-manual" onclick="ver('manual')"><span class="nav-icon">➕</span>MANUAL</div>
    <div class="nav-item" id="btn-delivery" onclick="ver('delivery')"><span class="nav-icon">🛵</span>DELY</div>
    <div class="nav-item" id="btn-config" onclick="ver('config')"><span class="nav-icon">⚙️</span>CONFIG</div>
  </div>

  <div id="p-lista" class="panel active"><div class="section" id="cont-lista"></div></div>
  
  <div id="p-manual" class="panel">
    <div class="section">
      <h3 style="margin-bottom:10px">Carga Manual</h3>
      <input id="m-pat" placeholder="PATENTE" style="width:100%; padding:15px; margin-bottom:10px; border-radius:10px; background:var(--bg3); color:white; border:none; text-align:center;">
      <button onclick="guardarManual()" style="width:100%; padding:20px; background:var(--blue); color:white; border:none; border-radius:12px; font-weight:800;">REGISTRAR</button>
    </div>
  </div>

  <div id="p-delivery" class="panel">
    <div class="section">
      <h3 style="margin-bottom:10px; color:var(--gold)">Panel Delivery</h3>
      <p style="opacity:0.6">Registros rápidos de repartidores.</p>
    </div>
  </div>

  <div id="p-config" class="panel">
    <div class="section">
      <h3 style="margin-bottom:10px; color:var(--cyan)">Configuración</h3>
      <p style="opacity:0.6">ID Planilla: NEXOS_DATABASE_2026</p>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  let DB = [];

  function vibrar() { if(navigator.vibrate) navigator.vibrate(50); }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerText = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  }

  // ESTA FUNCIÓN ES LA QUE HACÍA FALLAR EL TÁCTIL (REPARADA)
  function ver(nombre) {
    vibrar();
    // 1. Ocultar todos los paneles
    document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
    // 2. Desactivar todos los botones del menú
    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
    
    // 3. Activar el panel elegido
    document.getElementById('p-' + nombre).classList.add('active');
    // 4. Activar el botón del menú elegido
    document.getElementById('btn-' + nombre).classList.add('active');
  }

  function registrar(tipo) {
    vibrar();
    const val = document.getElementById('buscador').value.trim();
    if(!val) { showToast("⚠️ INGRESE DATO"); return; }
    
    const hora = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    if(tipo === 'ingreso') {
      DB.push({pat: val, hE: hora, hS: ''});
      showToast("✅ INGRESO OK");
    } else {
      let r = DB.find(x => x.pat === val && !x.hS);
      if(r) { r.hS = hora; showToast("🚪 SALIDA OK"); }
      else showToast("❌ NO ENCONTRADO");
    }
    document.getElementById('buscador').value = '';
    render();
  }

  function guardarManual() {
    vibrar();
    const p = document.getElementById('m-pat').value.trim();
    if(!p) return;
    DB.push({pat: p, hE: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), hS: ''});
    document.getElementById('m-pat').value = '';
    showToast("✅ REGISTRADO");
    ver('lista');
    render();
  }

  function render() {
    const cont = document.getElementById('cont-lista');
    cont.innerHTML = DB.slice().reverse().map(r => `
      <div class="reg-item ${r.hS ? '' : 'adentro'}">
        <div><strong>${r.pat}</strong><br><small>E: ${r.hE} ${r.hS ? ' S: '+r.hS : ''}</small></div>
      </div>
    `).join('') || '<div style="text-align:center; padding:20px; opacity:0.5">Vacío</div>';
    document.getElementById('mon-v').innerText = DB.filter(x => !x.hS).length;
  }
</script>
</body>
</html>
